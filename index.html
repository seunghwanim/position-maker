<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ 인사FC 포지션 메이커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:       #1a7a3c;
      --green-light: #2cb552;
      --accent:      #f5c518;
      --accent2:     #ff6b35;
      --bg:          #0d1117;
      --card:        rgba(255,255,255,0.06);
      --text:        #f0f0f0;
      --muted:       #8b9ab0;
      --radius:      12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }
    h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      text-align: center;
      letter-spacing: -1px;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }

    /* API Key */
    .api-section {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 16px 20px;
      max-width: 600px;
      margin: 0 auto 24px;
    }
    .api-section label { font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 8px; }
    .api-row { display: flex; gap: 10px; }
    .api-section input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      font-family: monospace;
    }
    .api-section input:focus { border-color: var(--accent); }
    .btn-save {
      background: var(--accent); color: #000; font-weight: 700;
      border: none; border-radius: 8px; padding: 10px 18px;
      cursor: pointer; font-size: 0.9rem; white-space: nowrap;
    }
    .btn-save:hover { background: #e0b014; }

    /* Roster */
    .roster-section { max-width: 600px; margin: 0 auto 28px; }
    .roster-section h2 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.1rem; color: var(--accent2); margin-bottom: 12px;
    }
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px; margin-bottom: 16px;
    }
    .player-chip {
      background: var(--card);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 10px 12px;
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; transition: border-color .2s, background .2s;
      font-size: 0.9rem; user-select: none;
    }
    .player-chip input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
    .player-chip:hover { border-color: var(--accent); }
    .player-chip.selected { border-color: var(--green-light); background: rgba(44,181,82,0.12); }
    .selected-count { font-size: 0.82rem; color: var(--muted); margin-bottom: 14px; }
    .selected-count span { color: var(--accent); font-weight: 700; }
    .btn-generate {
      width: 100%;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: #fff; font-family: 'Black Han Sans', sans-serif;
      font-size: 1.1rem; border: none; border-radius: var(--radius);
      padding: 16px; cursor: pointer; letter-spacing: 1px;
      transition: opacity .2s, transform .1s;
    }
    .btn-generate:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Loading */
    .loading { text-align: center; padding: 40px; color: var(--muted); display: none; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    .loading-step { font-size: 0.85rem; margin-top: 8px; color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Quarter tabs */
    .quarters-nav {
      display: flex; gap: 8px; justify-content: center;
      margin: 32px 0 20px; flex-wrap: wrap;
    }
    .quarter-tab {
      background: var(--card);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 30px; padding: 8px 22px;
      color: var(--muted); cursor: pointer;
      font-size: 0.9rem; font-weight: 600; transition: all .2s;
    }
    .quarter-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* Pitch */
    .pitch-wrapper { max-width: 420px; margin: 0 auto; }
    .pitch {
      position: relative; width: 100%; aspect-ratio: 0.65;
      background: var(--green); border-radius: 10px; overflow: hidden;
      border: 3px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .pitch::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        180deg, transparent 0px, transparent 40px,
        rgba(0,0,0,0.07) 40px, rgba(0,0,0,0.07) 80px
      );
    }
    .field-lines { position: absolute; inset: 0; }
    .field-lines svg { width: 100%; height: 100%; }
    .player-node {
      position: absolute; transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; z-index: 10;
    }
    .player-circle {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.58rem; font-weight: 700;
      border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      text-align: center; line-height: 1.2;
    }
    .player-circle.gk  { background: #f5c518; color: #000; }
    .player-circle.def { background: #1a5fa8; color: #fff; }
    .player-circle.mid { background: #6b3fa0; color: #fff; }
    .player-circle.att { background: #cc2936; color: #fff; }
    .player-name {
      background: rgba(0,0,0,0.75); color: #fff;
      font-size: 0.68rem; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
      white-space: nowrap;
    }

    /* Play time table */
    .playtime-box {
      max-width: 420px; margin: 20px auto 0;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .playtime-box h3 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 0.85rem; color: var(--accent);
      margin-bottom: 12px; letter-spacing: 1px;
    }
    .playtime-grid {
      display: grid;
      grid-template-columns: 1fr repeat(5, auto);
      gap: 4px 10px; align-items: center;
      font-size: 0.78rem;
    }
    .playtime-grid .hdr { color: var(--muted); font-weight: 700; text-align: center; padding-bottom: 6px; }
    .playtime-grid .pname { color: var(--text); padding: 3px 0; }
    .playtime-grid .cell { text-align: center; padding: 3px 0; }
    .cell.played  { color: var(--green-light); font-weight: 700; }
    .cell.gk-q    { color: var(--accent); font-weight: 700; font-size: 0.7rem; }
    .cell.resting { color: rgba(255,255,255,0.2); }
    .total-chip {
      display: inline-block;
      background: var(--green);
      color: #fff; font-weight: 700;
      border-radius: 4px; padding: 1px 6px;
      font-size: 0.72rem;
    }

    /* Reasoning */
    .reasoning-box {
      max-width: 420px; margin: 16px auto 0;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 16px 18px;
      font-size: 0.82rem; color: var(--muted);
      line-height: 1.7; white-space: pre-wrap;
    }
    .reasoning-box h3 {
      font-size: 0.78rem; color: var(--accent);
      margin-bottom: 8px;
      font-family: 'Black Han Sans', sans-serif; letter-spacing: 1px;
    }

    /* Error */
    .error-box {
      max-width: 600px; margin: 20px auto;
      background: rgba(204,41,54,0.15);
      border: 1px solid rgba(204,41,54,0.4);
      border-radius: var(--radius);
      padding: 14px 18px; font-size: 0.88rem; color: #ff8080; display: none;
    }
  </style>
</head>
<body>

<h1>⚽ 인사FC 포지션 메이커</h1>
<p class="subtitle">4-2-3-1 포메이션 · AI 자동 배치 · 균등 출전 · ver 0.91</p>

<!-- API Key -->
<div class="api-section">
  <label>🔑 Gemini API 키 (기기에만 저장됩니다)</label>
  <div class="api-row">
    <input type="password" id="apiKeyInput" placeholder="AIza..." />
    <button class="btn-save" onclick="saveApiKey()">저장</button>
  </div>
</div>

<!-- Roster -->
<div class="roster-section">
  <h2>📋 오늘 출전 선수 선택</h2>
  <div class="player-grid" id="playerGrid"></div>
  <p class="selected-count">선택된 선수: <span id="selectedCount">0</span>명 (최소 11명)</p>
  <button class="btn-generate" id="generateBtn" disabled onclick="generateFormation()">
    🤖 AI 포지션 짜기
  </button>
</div>

<div class="error-box" id="errorBox"></div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>AI가 4쿼터 포지션을 분석 중입니다...</p>
  <p class="loading-step" id="loadingStep"></p>
</div>

<!-- Quarter tabs -->
<div class="quarters-nav" id="quartersNav" style="display:none"></div>

<!-- Pitch + tables -->
<div class="pitch-wrapper" id="pitchWrapper" style="display:none">
  <div class="pitch" id="pitch">
    <div class="field-lines">
      <svg viewBox="0 0 100 154" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="77" x2="100" y2="77" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
        <circle cx="50" cy="77" r="12" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" fill="none"/>
        <circle cx="50" cy="77" r="0.8" fill="rgba(255,255,255,0.5)"/>
        <rect x="18" y="0" width="64" height="22" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" fill="none"/>
        <rect x="34" y="0" width="32" height="11" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" fill="none"/>
        <rect x="18" y="132" width="64" height="22" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" fill="none"/>
        <rect x="34" y="143" width="32" height="11" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" fill="none"/>
        <path d="M0,0 Q4,0 4,4" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" fill="none"/>
        <path d="M100,0 Q96,0 96,4" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" fill="none"/>
        <path d="M0,154 Q4,154 4,150" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" fill="none"/>
        <path d="M100,154 Q96,154 96,150" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" fill="none"/>
      </svg>
    </div>
  </div>

  <!-- Play time summary -->
  <div class="playtime-box" id="playtimeBox" style="display:none">
    <h3>⏱ 출전 쿼터 현황</h3>
    <div class="playtime-grid" id="playtimeGrid"></div>
  </div>

  <!-- Reasoning -->
  <div class="reasoning-box" id="reasoningBox" style="display:none">
    <h3>🧠 AI 배치 설명</h3>
    <div id="reasoningText"></div>
  </div>
</div>

<script>
// ===================== 선수 데이터 =====================
const PLAYERS = [
  { name: "임승환", positions: { GK:"main",  LWB:"backup", LCB:"backup", RCB:"backup", RWB:"backup", DM1:"backup", DM2:"backup", CAM:"sub",  LW:"main",  ST:"main",   RW:"main"   } },
  { name: "김대근", positions: { GK:"main",  LWB:null,     LCB:"main",   RCB:"main",   RWB:null,     DM1:"main",   DM2:"main",   CAM:null,   LW:null,    ST:null,     RW:null     } },
  { name: "김도윤", positions: { GK:null,    LWB:null,     LCB:"main",   RCB:"main",   RWB:null,     DM1:"sub",    DM2:"sub",    CAM:null,   LW:null,    ST:null,     RW:null     } },
  { name: "김보승", positions: { GK:"main",  LWB:"main",   LCB:"sub",    RCB:"sub",    RWB:"main",   DM1:null,     DM2:null,     CAM:null,   LW:null,    ST:null,     RW:null     } },
  { name: "김준성", positions: { GK:null,    LWB:"main",   LCB:"main",   RCB:"main",   RWB:"main",   DM1:null,     DM2:null,     CAM:null,   LW:null,    ST:null,     RW:null     } },
  { name: "김평화", positions: { GK:null,    LWB:null,     LCB:null,     RCB:null,     RWB:null,     DM1:null,     DM2:null,     CAM:null,   LW:"main",  ST:null,     RW:"main"   } },
  { name: "김표근", positions: { GK:null,    LWB:null,     LCB:null,     RCB:null,     RWB:null,     DM1:"sub",    DM2:"sub",    CAM:"main", LW:null,    ST:null,     RW:null     } },
  { name: "박성렬", positions: { GK:null,    LWB:null,     LCB:null,     RCB:null,     RWB:null,     DM1:null,     DM2:null,     CAM:"sub",  LW:null,    ST:"main",   RW:null     } },
  { name: "양경준", positions: { GK:null,    LWB:null,     LCB:"main",   RCB:"main",   RWB:null,     DM1:null,     DM2:null,     CAM:null,   LW:null,    ST:null,     RW:null     } },
  { name: "염승주", positions: { GK:null,    LWB:"backup", LCB:null,     RCB:null,     RWB:"backup", DM1:"main",   DM2:"main",   CAM:"sub",  LW:null,    ST:"backup", RW:null     } },
  { name: "전수현", positions: { GK:"main",  LWB:"main",   LCB:null,     RCB:null,     RWB:null,     DM1:null,     DM2:null,     CAM:null,   LW:null,    ST:null,     RW:null     } },
  { name: "정금교", positions: { GK:null,    LWB:null,     LCB:null,     RCB:null,     RWB:null,     DM1:null,     DM2:null,     CAM:"sub",  LW:"main",  ST:null,     RW:"main"   } },
  { name: "진민석", positions: { GK:null,    LWB:null,     LCB:"main",   RCB:"main",   RWB:null,     DM1:"main",   DM2:"main",   CAM:null,   LW:null,    ST:null,     RW:null     } }
];

const GK_ROTATION = ["임승환", "김대근", "김보승", "전수현"];

const POSITION_LAYOUT = {
  ST:  { x: 50, y: 12, role: "att", label: "ST"  },
  LW:  { x: 15, y: 24, role: "att", label: "LW"  },
  RW:  { x: 85, y: 24, role: "att", label: "RW"  },
  CAM: { x: 50, y: 36, role: "mid", label: "CAM" },
  DM1: { x: 35, y: 50, role: "mid", label: "DM"  },
  DM2: { x: 65, y: 50, role: "mid", label: "DM"  },
  LWB: { x: 10, y: 64, role: "def", label: "LWB" },
  LCB: { x: 32, y: 70, role: "def", label: "LCB" },
  RCB: { x: 68, y: 70, role: "def", label: "RCB" },
  RWB: { x: 90, y: 64, role: "def", label: "RWB" },
  GK:  { x: 50, y: 88, role: "gk",  label: "GK"  }
};

let allQuarterResults = [];

// ===================== 초기화 =====================
window.onload = () => {
  const saved = localStorage.getItem("gemini_api_key");
  if (saved) document.getElementById("apiKeyInput").value = saved;
  renderPlayerGrid();
};

function saveApiKey() {
  const val = document.getElementById("apiKeyInput").value.trim();
  if (!val) return;
  localStorage.setItem("gemini_api_key", val);
  alert("API 키가 저장되었습니다.");
}

function getApiKey() {
  return document.getElementById("apiKeyInput").value.trim()
      || localStorage.getItem("gemini_api_key") || "";
}

// ===================== 선수 그리드 =====================
function renderPlayerGrid() {
  const grid = document.getElementById("playerGrid");
  grid.innerHTML = PLAYERS.map(p =>
    '<label class="player-chip" id="chip_' + p.name + '">' +
    '<input type="checkbox" value="' + p.name + '" onchange="onPlayerToggle()" />' +
    p.name + '</label>'
  ).join("");
}

function onPlayerToggle() {
  const checked = getSelectedPlayers();
  document.getElementById("selectedCount").textContent = checked.length;
  document.getElementById("generateBtn").disabled = checked.length < 11;
  document.querySelectorAll(".player-chip").forEach(function(chip) {
    chip.classList.toggle("selected", chip.querySelector("input").checked);
  });
}

function getSelectedPlayers() {
  return Array.from(document.querySelectorAll(".player-chip input:checked")).map(function(i) { return i.value; });
}

// ===================== 출전 배정 계산 =====================
var FIELD_POSITIONS = ["LWB","LCB","RCB","RWB","DM1","DM2","CAM","LW","ST","RW"];

function canPlay(name, pos) {
  var p = PLAYERS.filter(function(pl) { return pl.name === name; })[0];
  return p && p.positions[pos] != null;
}

function select10WithCoverage(candidates, remaining, q, gkByQuarter) {
  // 긴박도 계산
  function urgency(p) {
    var future = 0;
    for (var fq = q; fq < 4; fq++) { if (gkByQuarter[fq] !== p) future++; }
    return future > 0 ? remaining[p] / future : 0;
  }

  // 긴박도 순 정렬 후 10명 초안
  var sorted = candidates.slice().sort(function(a, b) { return urgency(b) - urgency(a); });
  var chosen = sorted.slice(0, 10);

  // 커버 안 되는 포지션 찾기
  var uncovered = FIELD_POSITIONS.filter(function(pos) {
    return !chosen.some(function(p) { return canPlay(p, pos); });
  });

  if (uncovered.length === 0) return chosen;

  // 커버 안 되는 포지션마다 교체 시도
  var notChosen = candidates.filter(function(p) { return chosen.indexOf(p) < 0; });

  uncovered.forEach(function(pos) {
    // 이 포지션 커버 가능한 후보
    var coverCandidates = notChosen.filter(function(p) { return canPlay(p, pos); });
    if (coverCandidates.length === 0) return;
    coverCandidates.sort(function(a, b) { return urgency(b) - urgency(a); });
    var newPlayer = coverCandidates[0];

    // chosen 중 긴박도 낮은 사람부터 교체 시도 (다른 포지션 커버 안 무너지게)
    var chosenByUrgency = chosen.slice().sort(function(a, b) { return urgency(a) - urgency(b); });
    for (var i = 0; i < chosenByUrgency.length; i++) {
      var oldPlayer = chosenByUrgency[i];
      var testChosen = chosen.filter(function(p) { return p !== oldPlayer; }).concat([newPlayer]);
      // 기존에 커버되던 포지션이 무너지지 않는지 확인
      var ok = FIELD_POSITIONS.every(function(otherPos) {
        if (otherPos === pos) return true;
        var wasCovered = chosen.some(function(p) { return canPlay(p, otherPos); });
        if (!wasCovered) return true;
        return testChosen.some(function(p) { return canPlay(p, otherPos); });
      });
      if (ok) {
        chosen = testChosen;
        notChosen = notChosen.filter(function(p) { return p !== newPlayer; }).concat([oldPlayer]);
        break;
      }
    }
  });

  return chosen;
}

function calcAssignment(selectedNames) {
  // 1. GK 확정
  var availableGKs = GK_ROTATION.filter(function(gk) { return selectedNames.indexOf(gk) >= 0; });
  var gkByQuarter = [0,1,2,3].map(function(q) { return availableGKs[q % availableGKs.length]; });

  var gkCount = {};
  selectedNames.forEach(function(n) { gkCount[n] = 0; });
  gkByQuarter.forEach(function(name) { gkCount[name]++; });

  // 2. 필드 출전 횟수 확정
  var n = selectedNames.length;
  var base = Math.floor(40 / n);
  var extra = 40 % n;

  // extra: 비GK 중 랜덤 배정
  var nonGkPlayers = selectedNames.filter(function(p) { return gkCount[p] === 0; });
  for (var i = nonGkPlayers.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = nonGkPlayers[i]; nonGkPlayers[i] = nonGkPlayers[j]; nonGkPlayers[j] = tmp;
  }
  var extraWinners = {};
  for (var i = 0; i < extra; i++) { if (nonGkPlayers[i]) extraWinners[nonGkPlayers[i]] = true; }

  var fieldQuota = {};
  selectedNames.forEach(function(p) {
    var t = base + (extraWinners[p] ? 1 : 0);
    fieldQuota[p] = Math.min(t, 4 - gkCount[p]);
  });

  // 3. 쿼터별 필드 10명 확정 (포지션 커버리지 보장)
  var remaining = {};
  selectedNames.forEach(function(p) { remaining[p] = fieldQuota[p]; });
  var quarterLineups = [];

  for (var q = 0; q < 4; q++) {
    var gk = gkByQuarter[q];
    var candidates = selectedNames.filter(function(p) { return p !== gk && remaining[p] > 0; });
    var fieldPlayers = select10WithCoverage(candidates, remaining, q, gkByQuarter);

    // 10명 미달 시 remaining=0인 사람으로 채움
    if (fieldPlayers.length < 10) {
      var extras = selectedNames.filter(function(p) {
        return p !== gk && fieldPlayers.indexOf(p) < 0;
      });
      fieldPlayers = fieldPlayers.concat(extras.slice(0, 10 - fieldPlayers.length));
    }

    fieldPlayers.forEach(function(p) { if (remaining[p] > 0) remaining[p]--; });
    quarterLineups.push({ gk: gk, fieldPlayers: fieldPlayers });
  }

  return { gkByQuarter: gkByQuarter, fieldQuota: fieldQuota, quarterLineups: quarterLineups, gkCount: gkCount };
}

// ===================== 그리디 초안 배치 =====================
function greedyAssign(fieldPlayers) {
  var FP = ["LWB","LCB","RCB","RWB","DM1","DM2","CAM","LW","ST","RW"];
  var assignedPos = {};   // pos -> name
  var assignedPlayer = {};

  ["main","sub","backup"].forEach(function(priority) {
    // 이 우선순위로 뛸 수 있는 미배치 선수들
    // 가능 포지션 수 적은 순 (선택지 좁은 사람 먼저)
    var candidates = fieldPlayers
      .filter(function(name) { return !assignedPlayer[name]; })
      .map(function(name) {
        var p = PLAYERS.filter(function(pl) { return pl.name === name; })[0];
        var availPos = FP.filter(function(pos) {
          return !assignedPos[pos] && p && p.positions[pos] === priority;
        });
        return { name: name, availPos: availPos };
      })
      .filter(function(c) { return c.availPos.length > 0; })
      .sort(function(a, b) { return a.availPos.length - b.availPos.length; });

    candidates.forEach(function(c) {
      if (assignedPlayer[c.name]) return;
      // 아직 빈 포지션 중 첫 번째 배정
      var freePos = c.availPos.filter(function(pos) { return !assignedPos[pos]; });
      if (freePos.length > 0) {
        assignedPos[freePos[0]] = c.name;
        assignedPlayer[c.name] = true;
      }
    });
  });

  // 남은 선수/포지션 순서대로 채우기
  var remainingPlayers = fieldPlayers.filter(function(p) { return !assignedPlayer[p]; });
  var remainingPos = FP.filter(function(pos) { return !assignedPos[pos]; });
  remainingPos.forEach(function(pos, i) {
    if (remainingPlayers[i]) assignedPos[pos] = remainingPlayers[i];
  });

  return assignedPos;
}

// ===================== 쿼터별 프롬프트 빌더 =====================
function buildQuarterPrompt(quarterIdx, qLineup) {
  var gkName = qLineup.gk;
  var fieldPlayers = qLineup.fieldPlayers;
  var FP = ["LWB","LCB","RCB","RWB","DM1","DM2","CAM","LW","ST","RW"];
  var priorityLabel = { main: "주", sub: "서브", backup: "백업" };

  // 코드가 그리디 초안 계산
  var draft = greedyAssign(fieldPlayers);

  // 초안 설명 (각 포지션에 왜 이 선수인지)
  var draftDesc = FP.map(function(pos) {
    var name = draft[pos] || "없음";
    var p = PLAYERS.filter(function(pl) { return pl.name === name; })[0];
    var lvl = p && p.positions[pos] ? priorityLabel[p.positions[pos]] : "포지션없음";
    return pos + ": " + name + "(" + lvl + ")";
  }).join(", ");

  // 선수별 가능 포지션
  var playerDesc = fieldPlayers.map(function(name) {
    var p = PLAYERS.filter(function(pl) { return pl.name === name; })[0];
    if (!p) return "- " + name + ": 지정없음";
    var entries = FP
      .filter(function(pos) { return p.positions[pos] != null; })
      .sort(function(a, b) {
        var score = { main:3, sub:2, backup:1 };
        return (score[p.positions[b]]||0) - (score[p.positions[a]]||0);
      })
      .map(function(pos) { return pos + "(" + (priorityLabel[p.positions[pos]]||"?") + ")"; });
    return "- " + name + ": " + (entries.length ? entries.join(", ") : "무관");
  }).join("\n");

  return (quarterIdx+1) + "쿼터 포지션 배치\n\n" +
    "GK(확정): " + gkName + "\n\n" +
    "필드 선수 10명:\n" + playerDesc + "\n\n" +
    "코드가 계산한 초안 배치:\n" + draftDesc + "\n\n" +
    "규칙:\n" +
    "1. 초안을 기반으로, 더 나은 배치가 있으면 조정해도 됨\n" +
    "2. 단, 조정 시 반드시 주>서브>백업 우선순위 지킬 것\n" +
    "   - 주 포지션 선수가 있는데 서브/백업 선수를 배치하면 안 됨\n" +
    "   - null(불가) 포지션에는 절대 배치 불가\n" +
    "3. 각 선수는 정확히 1개 포지션에만 (중복 절대 불가)\n" +
    "4. 10개 포지션 모두 반드시 채울 것\n\n" +
    "JSON만 응답:\n" +
    '{"LWB":"이름","LCB":"이름","RCB":"이름","RWB":"이름","DM1":"이름","DM2":"이름","CAM":"이름","LW":"이름","ST":"이름","RW":"이름","reasoning":"한두줄"}';
}

// ===================== Gemini API 호출 =====================
async function callGemini(prompt) {
  var apiKey = getApiKey();
  if (!apiKey) throw new Error("Gemini API 키를 입력해주세요.");

  var res = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.3, maxOutputTokens: 1024,
          thinkingConfig: { thinkingBudget: 512 } }
      })
    }
  );

  if (!res.ok) {
    var err = await res.json().catch(function() { return {}; });
    throw new Error((err.error && err.error.message) || ("API 오류 (" + res.status + ")"));
  }

  var data = await res.json();
  var text = (data.candidates&&data.candidates[0]&&data.candidates[0].content&&
              data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&
              data.candidates[0].content.parts[0].text) || "";
  var clean = text.replace(/```[a-z]*\n?/gi, "").replace(/```/g, "").trim();
  try {
    return JSON.parse(clean);
  } catch(e) {
    var match = clean.match(/\{[\s\S]*\}/);
    if (match) { try { return JSON.parse(match[0]); } catch(e2) {} }
    throw new Error("AI 응답 파싱 실패. 다시 시도해주세요.");
  }
}

// ===================== 중복 선수 검증 =====================
function checkDuplicates(lineup) {
  var names = Object.keys(lineup).filter(function(k) { return k !== "reasoning"; })
                   .map(function(k) { return lineup[k]; });
  return names.length !== new Set(names).size;
}

// ===================== 메인: 생성 =====================
async function generateFormation() {
  var selected = getSelectedPlayers();
  if (selected.length < 11) return;
  if (!getApiKey()) { showError("Gemini API 키를 먼저 입력해주세요."); return; }

  var availableGKs = GK_ROTATION.filter(function(gk) { return selected.indexOf(gk) >= 0; });
  if (availableGKs.length === 0) {
    showError("골키퍼 가능 선수(임승환, 김대근, 김보승, 전수현) 중 한 명 이상이 포함되어야 합니다.");
    return;
  }

  hideError();
  document.getElementById("loading").style.display = "block";
  document.getElementById("quartersNav").style.display = "none";
  document.getElementById("pitchWrapper").style.display = "none";
  document.getElementById("generateBtn").disabled = true;

  // 코드가 출전 배정 완전 확정
  var assignment = calcAssignment(selected);
  allQuarterResults = [];

  try {
    for (var q = 0; q < 4; q++) {
      document.getElementById("loadingStep").textContent = (q+1) + "쿼터 배치 중...";
      var qLineup = assignment.quarterLineups[q];
      var prompt = buildQuarterPrompt(q, qLineup);
      var result = null;

      for (var attempt = 0; attempt < 3; attempt++) {
        result = await callGemini(prompt);
        result.GK = qLineup.gk;
        if (!checkDuplicates(result)) break;
        if (attempt === 2) {
          // AI 실패 시 그리디 초안으로 폴백
          var draftResult = greedyAssign(qLineup.fieldPlayers);
          draftResult.GK = qLineup.gk;
          draftResult.reasoning = "AI 배치 실패로 코드 초안 사용";
          result = draftResult;
        }
      }
      allQuarterResults.push({ quarter: q+1, lineup: result, reasoning: result.reasoning || "" });
    }

    renderQuarterTabs();
    renderPlaytimeTable(selected, assignment);
    showQuarter(0);
    document.getElementById("quartersNav").style.display = "flex";
    document.getElementById("pitchWrapper").style.display = "block";
  } catch(e) {
    showError("오류: " + e.message);
  } finally {
    document.getElementById("loading").style.display = "none";
    document.getElementById("generateBtn").disabled = false;
  }
}

// ===================== 쿼터 탭 =====================
function renderQuarterTabs() {
  var nav = document.getElementById("quartersNav");
  nav.innerHTML = allQuarterResults.map(function(q, i) {
    return '<button class="quarter-tab" data-q="' + i + '" onclick="showQuarter(' + i + ')">' +
           (i+1) + '쿼터 (GK: ' + q.lineup.GK + ')</button>';
  }).join("");
}

function showQuarter(idx) {
  document.querySelectorAll(".quarter-tab").forEach(function(tab) {
    tab.classList.toggle("active", parseInt(tab.dataset.q) === idx);
  });
  var qr = allQuarterResults[idx];
  renderPitch(qr.lineup);
  if (qr.reasoning) {
    document.getElementById("reasoningText").textContent = qr.reasoning;
    document.getElementById("reasoningBox").style.display = "block";
  } else {
    document.getElementById("reasoningBox").style.display = "none";
  }
}

// ===================== 피치 렌더링 =====================
function renderPitch(lineup) {
  var pitch = document.getElementById("pitch");
  pitch.querySelectorAll(".player-node").forEach(function(n) { n.remove(); });

  Object.keys(lineup).forEach(function(pos) {
    var name = lineup[pos];
    var layout = POSITION_LAYOUT[pos];
    if (!layout) return;

    var node = document.createElement("div");
    node.className = "player-node";
    node.style.left = layout.x + "%";
    node.style.top  = layout.y + "%";
    node.innerHTML =
      '<div class="player-circle ' + layout.role + '">' + layout.label + '</div>' +
      '<div class="player-name">' + name + '</div>';
    pitch.appendChild(node);
  });
}

// ===================== 출전 현황 테이블 =====================
function renderPlaytimeTable(selectedNames, assignment) {
  var html =
    '<div class="hdr pname">선수</div>' +
    '<div class="hdr">1Q</div><div class="hdr">2Q</div><div class="hdr">3Q</div><div class="hdr">4Q</div>' +
    '<div class="hdr">필드</div>';

  selectedNames.forEach(function(name) {
    html += '<div class="pname">' + name + '</div>';
    var fieldCount = 0;
    for (var q = 0; q < 4; q++) {
      var gk = assignment.gkByQuarter[q];
      var isField = assignment.quarterLineups[q].fieldPlayers.indexOf(name) >= 0;
      if (gk === name) {
        html += '<div class="cell gk-q">GK</div>';
      } else if (isField) {
        html += '<div class="cell played">●</div>';
        fieldCount++;
      } else {
        html += '<div class="cell resting">–</div>';
      }
    }
    html += '<div class="cell"><span class="total-chip">' + fieldCount + 'Q</span></div>';
  });

  document.getElementById("playtimeGrid").innerHTML = html;
  document.getElementById("playtimeBox").style.display = "block";
}

// ===================== 유틸 =====================
function showError(msg) {
  var box = document.getElementById("errorBox");
  box.textContent = msg;
  box.style.display = "block";
}
function hideError() {
  document.getElementById("errorBox").style.display = "none";
}
</script>
